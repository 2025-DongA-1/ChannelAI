name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '배포 대상 선택'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - was
          - web

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # 빌드 & 테스트
  # ============================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: TypeScript build (Backend)
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend build
        working-directory: ./frontend
        run: npm run build

      # 💡 [개선점] 프론트엔드 빌드 결과물을 아티팩트로 저장하여 deploy 잡에서 재사용
      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ============================================
  # WAS 서버 배포 (Push 또는 수동실행)
  # ============================================
  deploy-was:
    needs: [build]
    runs-on: ubuntu-latest
    # 💡 [개선점] Push 이벤트에서도 동작하도록 조건 변경 (자동 CD 활성화)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'was'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to WAS via WEB server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEB_HOST }}
          username: root
          key: ${{ secrets.WEB_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            APP_DIR="/opt/marketing-platform"

            # ========== 1. WEB 서버에서 최신 코드 pull ==========
            if [ -d "$APP_DIR/.git" ]; then
              echo ">> git pull..."
              cd $APP_DIR
              git fetch origin
              git reset --hard origin/main
              git clean -fd   # untracked 파일 완전 제거
            else
              echo ">> 최초 clone..."
              rm -rf $APP_DIR
              git clone https://github.com/2025-DongA-1/ChannelAI.git $APP_DIR
            fi

            # ========== 2. WAS 서버로 코드 복사 ==========
            echo ">> WAS 서버로 코드 복사 중..."
            rsync -av --delete \
              --exclude='.git' \
              --exclude='node_modules' \
              --exclude='frontend' \
              $APP_DIR/ root@10.10.10.7:/opt/marketing-platform/

      - name: Setup WAS server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WAS_HOST }}
          username: root
          key: ${{ secrets.WAS_SSH_KEY }}
          port: 22
          proxy_host: ${{ secrets.WEB_HOST }}
          proxy_username: root
          proxy_key: ${{ secrets.WEB_SSH_KEY }}
          proxy_port: 22
          command_timeout: 10m
          script: |
            set -e
            # ========== 0. socat 설치 ==========
            if ! command -v socat &> /dev/null; then
              apt-get install -y socat
            fi
            if [ ! -f /etc/systemd/system/socat-db.service ]; then
              cat > /etc/systemd/system/socat-db.service << SOCATEOF
            [Unit]
            Description=Socat DB Proxy
            After=network.target
            [Service]
            ExecStart=/usr/bin/socat TCP-LISTEN:3307,fork TCP:${{ secrets.DB_EXTERNAL_HOST }}:${{ secrets.DB_EXTERNAL_PORT }}
            Restart=always
            [Install]
            WantedBy=multi-user.target
            SOCATEOF
              systemctl daemon-reload
              systemctl enable socat-db
              systemctl start socat-db
            fi

            # ========== Python 패키지 설치 ==========
            if ! python3 -c "import pandas" 2>/dev/null; then
              apt-get install -y python3-pip
              pip3 install pandas numpy scikit-learn pymysql xgboost \
                --proxy http://10.10.10.6:3128 \
                --break-system-packages
            fi

            # ========== 1. Node.js 설치/업그레이드 ==========
            NODE_MAJOR=$(node -v 2>/dev/null | cut -d'.' -f1 | tr -d 'v' || echo "0")
            if [ "$NODE_MAJOR" -lt 20 ]; then
              echo ">> Node.js 20 설치 중... (현재: $(node -v 2>/dev/null || echo '없음'))"
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "Node.js: $(node -v), npm: $(npm -v)"

            # ========== 2. PM2 설치 (없으면) ==========
            if ! command -v pm2 &> /dev/null; then
              echo ">> PM2 설치 중..."
              npm install -g pm2
            fi

            cd /opt/marketing-platform/backend

            # ========== 3. 환경변수 설정 (.env 로컬과 동일 구조) ==========
            cat > .env << ENVEOF
            PORT=3000
            # --- External DB ---
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            # --- Common Config ---
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }}
            JWT_EXPIRES_IN=7d
            NODE_ENV=production
            FRONTEND_URL=https://channelai.kro.kr
            BACKEND_URL=https://channelai.kro.kr
            PYTHON_PATH=/usr/bin/python3
            AI_PROVIDER=groq
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=report@channelai.kro.kr
            ENABLE_DAILY_REPORT=true

            # Social Login
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_REDIRECT_URI=https://channelai.kro.kr/api/v1/auth/kakao/callback
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            NAVER_REDIRECT_URI=https://channelai.kro.kr/api/v1/auth/naver/callback
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=https://channelai.kro.kr/api/v1/auth/google/callback
            KARROT_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KARROT_REDIRECT_URI=https://channelai.kro.kr/api/v1/auth/karrot/callback

            # Redis
            REDIS_HOST=127.0.0.1
            REDIS_PORT=6379
            REDIS_PASSWORD=

            # Ads APIs
            META_APP_ID=${{ secrets.META_APP_ID }}
            META_APP_SECRET=${{ secrets.META_APP_SECRET }}
            META_REDIRECT_URI=https://channelai.kro.kr/api/v1/integration/callback/meta
            NAVER_ADS_CLIENT_ID=${{ secrets.NAVER_ADS_CLIENT_ID }}
            NAVER_ADS_CLIENT_SECRET=${{ secrets.NAVER_ADS_CLIENT_SECRET }}
            NAVER_ADS_REDIRECT_URI=https://channelai.kro.kr/api/v1/integration/callback/naver
            NAVER_CUSTOMER_ID=${{ secrets.NAVER_CUSTOMER_ID }}
            NAVER_API_KEY=${{ secrets.NAVER_API_KEY }}
            NAVER_SECRET_KEY=${{ secrets.NAVER_SECRET_KEY }}
            GOOGLE_ADS_REDIRECT_URI=https://channelai.kro.kr/api/v1/integration/callback/google
            GOOGLE_ADS_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_ADS_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_ADS_DEVELOPER_TOKEN=${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
            GOOGLE_ADS_REFRESH_TOKEN=${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}

            # Proxy
            HTTPS_PROXY=${{ secrets.WEB_PROXY_URL }}
            HTTP_PROXY=${{ secrets.WEB_PROXY_URL }}
            ENVEOF

            # 💡 [개선점] 다운타임을 방지하기 위해 pm2 delete와 node_modules rm 삭제
            echo ">> 의존성 업데이트 및 패키지 설치"
            cd /opt/marketing-platform/backend
            npm install --include=dev --no-audit --no-fund

            # ========== 5-1. 프록시 주입 스크립트 생성 ==========
            cat > /opt/marketing-platform/inject-proxy.py << 'PROXYEOF'
            import os
            AXIOS_FILES = [
                'backend/src/controllers/socialAuthController.ts',
                'backend/src/services/external/googleAdsService.ts',
                'backend/src/services/external/naverAdsService.ts',
                'backend/src/services/external/metaAdsService.ts',
                'backend/src/services/external/karrotAdsService.ts',
                'backend/src/services/external/karrotCrawlerService.ts',
            ]
            AXIOS_PROXY_CODE = "import { HttpsProxyAgent } from 'https-proxy-agent';\nconst proxyAgent = new HttpsProxyAgent(process.env.HTTPS_PROXY || 'http://10.10.10.6:3128');\naxios.defaults.httpsAgent = proxyAgent;\naxios.defaults.httpAgent = proxyAgent;\naxios.defaults.proxy = false;"
            GROQ_FILE = 'backend/src/services/ai/aiAnalysisService.ts'
            BASE_DIR = '/opt/marketing-platform'
            def inject_axios(filepath):
                full = os.path.join(BASE_DIR, filepath)
                if not os.path.exists(full): return
                with open(full, 'r') as f: content = f.read()
                if 'HttpsProxyAgent' in content: return
                content = content.replace("import axios from 'axios';", "import axios from 'axios';\n" + AXIOS_PROXY_CODE)
                with open(full, 'w') as f: f.write(content)
                print(f"  ✅ {os.path.basename(filepath)}")
            def inject_groq(filepath):
                full = os.path.join(BASE_DIR, filepath)
                if not os.path.exists(full): return
                with open(full, 'r') as f: content = f.read()
                if 'HttpsProxyAgent' not in content:
                    content = content.replace('import Groq from "groq-sdk";', 'import Groq from "groq-sdk";\nimport { HttpsProxyAgent } from "https-proxy-agent";')
                old = 'this.groq = process.env.GROQ_API_KEY ? new Groq({ apiKey: process.env.GROQ_API_KEY }) : null;'
                new = "const agent = new HttpsProxyAgent(process.env.HTTPS_PROXY || 'http://10.10.10.6:3128');\n      this.groq = process.env.GROQ_API_KEY ? new Groq({\n        apiKey: process.env.GROQ_API_KEY,\n        httpAgent: agent,\n        timeout: 300000,\n        maxRetries: 1,\n      }) : null;"
                if old in content: content = content.replace(old, new)
                with open(full, 'w') as f: f.write(content)
                print(f"  ✅ {os.path.basename(filepath)}")
            print(">> 프록시 주입 시작...")
            for f in AXIOS_FILES: inject_axios(f)
            inject_groq(GROQ_FILE)
            print(">> 프록시 주입 완료!")
            PROXYEOF

            # ========== 5-2. 프록시 코드 주입 실행 ==========
            python3 /opt/marketing-platform/inject-proxy.py

            # ========== 5-3. 빌드 (프록시 주입 후) ==========
            npx tsc

            # ========== 5. ecosystem.config.js 생성 ==========
            cat > /opt/marketing-platform/deploy/ecosystem.config.js << ECOEOF
            module.exports = {
              apps: [{
                name: 'marketing-api',
                script: 'dist/app.js',
                cwd: '/opt/marketing-platform/backend',
                instances: 2,
                exec_mode: 'cluster',
                env: {
                  NODE_ENV: 'production',
                  PORT: 3000,
                  HTTPS_PROXY: 'http://10.10.10.6:3128',
                  HTTP_PROXY: 'http://10.10.10.6:3128'
                },
                log_file: '/opt/marketing-platform/logs/combined.log',
                out_file: '/opt/marketing-platform/logs/out.log',
                error_file: '/opt/marketing-platform/logs/error.log',
                log_date_format: 'YYYY-MM-DD HH:mm:ss Z',
                max_size: '50M',
                retain: 10,
                max_memory_restart: '500M',
                watch: false,
                autorestart: true,
                restart_delay: 3000,
                max_restarts: 10,
                kill_timeout: 5000,
                listen_timeout: 10000
              }]
            };
            ECOEOF

            # ========== 6. PM2 무중단 재시작 ==========
            # 💡 [개선점] stop/delete 대신 reload를 사용하여 접속 다운타임 제거
            cd /opt/marketing-platform
            if pm2 list | grep -q "marketing-api"; then
              echo ">> 프로세스가 구동 중입니다. 무중단 리로드(Reload) 진행..."
              pm2 reload deploy/ecosystem.config.js --update-env
            else
              echo ">> 새 프로세스를 시작합니다."
              pm2 start deploy/ecosystem.config.js
            fi
            pm2 save

            # ========== 7. AI 모델 자동 학습 배경(Background) 실행 ==========
            # 💡 [개선점] API 배포 시간 지연 및 다운타임을 막기 위해 서버 백그라운드 프로세스로 분리
            echo ">> [배포 파이프라인 훅] AI 환경 점검 및 모델 파일 갱신..."
            if ! command -v python &> /dev/null && command -v python3 &> /dev/null; then
              sudo ln -snf $(which python3) /usr/bin/python || true
            fi
            cd /opt/marketing-platform/backend/ai
            if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt || true
            fi
            if [ -f "train_model_v2.py" ]; then
              nohup python train_model_v2.py > /opt/marketing-platform/logs/ai_train.log 2>&1 &
              echo ">> AI 모델 학습을 백그라운드 작업으로 분리하여 시작했습니다. (로그: ai_train.log)"
            fi

            # ========== 8. 편의 alias 등록 ==========
            sed -i '/alias proxy=/d' /root/.bashrc
            echo "alias proxy='cd /opt/marketing-platform && python3 inject-proxy.py && cd backend && npx tsc && pm2 reload marketing-api --update-env'" >> /root/.bashrc


  # ============================================
  # WEB 서버 배포 (Push 또는 수동실행)
  # ============================================
  deploy-web:
    needs: build
    runs-on: ubuntu-latest
    # 💡 [개선점] Push 이벤트에서도 동작하도록 조건 변경 (자동 CD 활성화)
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'all' || github.event.inputs.deploy_target == 'web'))

    steps:
      # 💡 [개선점] 소스코드를 다시 Checkout하고 npm run build 할 필요 없이 이전 저장된 Artifacts 호출
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy to WEB server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEB_HOST }}
          username: root
          key: ${{ secrets.WEB_SSH_KEY }}
          port: 22
          script: |
            # Nginx 정적 파일 갱신 준비
            rm -rf /opt/marketing-platform/frontend/dist/*

      - name: Copy build to WEB server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WEB_HOST }}
          username: root
          key: ${{ secrets.WEB_SSH_KEY }}
          port: 22
          # 다운받은 dist 폴더 원형을 그대로 WEB 서버에 SCP 전송
          source: "frontend/dist/*"
          target: "/opt/marketing-platform/frontend/dist/"
          strip_components: 2

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEB_HOST }}
          username: root
          key: ${{ secrets.WEB_SSH_KEY }}
          port: 22
          script: |
            if ! dpkg -l | grep -q squid; then
              apt-get install -y squid
              systemctl enable squid
              systemctl start squid
            fi

            if ! grep -q "location /api/" /etc/nginx/conf.d/default.conf; then
              echo ">> Nginx /api 경로 프록시 설정이 없어 새로 주입합니다..."
              sed -i '/server {/a \
                  location /api/ {\n\
                      proxy_pass http://10.10.10.7:3000;\n\
                      proxy_http_version 1.1;\n\
                      proxy_set_header Upgrade $http_upgrade;\n\
                      proxy_set_header Connection "upgrade";\n\
                      proxy_set_header Host $host;\n\
                      proxy_set_header X-Real-IP $remote_addr;\n\
                      proxy_cache_bypass $http_upgrade;\n\
                      proxy_read_timeout 300s;\n\
                      proxy_connect_timeout 300s;\n\
                  }\n' /etc/nginx/conf.d/default.conf
            fi

            sudo nginx -t && sudo systemctl reload nginx
